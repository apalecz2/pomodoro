<svg width="680" height="575" viewBox="0 0 680 575" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ESP8266 Pomodoro timer wiring diagram</title>
  <desc>NodeMCU ESP8266 driving a 74HC595 shift register with three control lines, the shift register feeding eight segment lines through 330 ohm resistors to a 5461AS four digit display, four digit select lines from the NodeMCU to the display cathodes, and three buttons to ground.</desc>
  <style>
    .t  { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #333; }
    .h  { font: 600 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #222; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="575" fill="#FBFAF7"/>

  <!-- NodeMCU -->
  <rect x="30" y="60" width="140" height="450" rx="8" fill="#F1EFE9" stroke="#8A8578" stroke-width="1"/>
  <text class="h" x="100" y="86" text-anchor="middle" dominant-baseline="central">NodeMCU</text>
  <text class="t" x="100" y="104" text-anchor="middle" dominant-baseline="central">ESP8266</text>
  <text class="t" x="162" y="180" text-anchor="end" dominant-baseline="central">D7 · GPIO13</text>
  <text class="t" x="162" y="210" text-anchor="end" dominant-baseline="central">D5 · GPIO14</text>
  <text class="t" x="162" y="240" text-anchor="end" dominant-baseline="central">D6 · GPIO12</text>
  <text class="t" x="162" y="280" text-anchor="end" dominant-baseline="central">D1 · GPIO5</text>
  <text class="t" x="162" y="310" text-anchor="end" dominant-baseline="central">D2 · GPIO4</text>
  <text class="t" x="162" y="340" text-anchor="end" dominant-baseline="central">D0 · GPIO16</text>
  <text class="t" x="162" y="370" text-anchor="end" dominant-baseline="central">D8 · GPIO15</text>
  <text class="t" x="162" y="415" text-anchor="end" dominant-baseline="central">D3 · GPIO0</text>
  <text class="t" x="162" y="450" text-anchor="end" dominant-baseline="central">D4 · GPIO2</text>
  <text class="t" x="162" y="485" text-anchor="end" dominant-baseline="central">RX · GPIO3</text>

  <!-- 595 control lines -->
  <path d="M170 180 L250 180 L250 140 L288 140" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M170 210 L262 210 L262 170 L288 170" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M170 240 L274 240 L274 200 L288 200" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 74HC595 -->
  <rect x="290" y="90" width="130" height="210" rx="8" fill="#E9F4F0" stroke="#1D9E75" stroke-width="1"/>
  <text class="h" x="355" y="112" text-anchor="middle" dominant-baseline="central">74HC595</text>
  <text class="t" x="298" y="140" text-anchor="start" dominant-baseline="central">DS · 14</text>
  <text class="t" x="298" y="170" text-anchor="start" dominant-baseline="central">SHCP · 11</text>
  <text class="t" x="298" y="200" text-anchor="start" dominant-baseline="central">STCP · 12</text>
  <text class="t" x="412" y="160" text-anchor="end" dominant-baseline="central">Q0–Q7</text>
  <text class="t" x="355" y="230" text-anchor="middle" dominant-baseline="central">VCC 16 → 3V3</text>
  <text class="t" x="355" y="248" text-anchor="middle" dominant-baseline="central">MR 10 → 3V3</text>
  <text class="t" x="355" y="266" text-anchor="middle" dominant-baseline="central">GND 8 → GND</text>
  <text class="t" x="355" y="284" text-anchor="middle" dominant-baseline="central">OE 13 → GND</text>

  <!-- Segment bus -->
  <text class="t" x="470" y="134" text-anchor="middle">8 segment lines</text>
  <line x1="420" y1="160" x2="445" y2="160" stroke="#6C63C7" stroke-width="3"/>
  <rect x="445" y="147" width="56" height="26" rx="4" fill="#FFFFFF" stroke="#8A8578" stroke-width="1"/>
  <text class="t" x="473" y="160" text-anchor="middle" dominant-baseline="central">330Ω ×8</text>
  <line x1="501" y1="160" x2="518" y2="160" stroke="#6C63C7" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Digit select lines (nested drops: topmost pin turns down furthest right, so no wire ever crosses another) -->
  <path d="M170 280 L236 280 L236 330 L518 330" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M170 310 L224 310 L224 350 L518 350" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M170 340 L212 340 L212 370 L518 370" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M170 370 L200 370 L200 390 L518 390" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="t" x="468" y="322" text-anchor="middle">D1 → DIG1</text>
  <text class="t" x="468" y="344" text-anchor="middle">D2 → DIG2</text>
  <text class="t" x="468" y="364" text-anchor="middle">D0 → DIG3</text>
  <text class="t" x="468" y="384" text-anchor="middle">D8 → DIG4</text>

  <!-- 5461AS -->
  <rect x="520" y="90" width="130" height="320" rx="8" fill="#EFEDF9" stroke="#6C63C7" stroke-width="1"/>
  <text class="h" x="585" y="112" text-anchor="middle" dominant-baseline="central">5461AS</text>
  <text class="t" x="585" y="130" text-anchor="middle" dominant-baseline="central">common cathode</text>
  <text class="t" x="530" y="160" text-anchor="start" dominant-baseline="central">A–G, DP</text>
  <text class="t" x="530" y="330" text-anchor="start" dominant-baseline="central">12 · DIG1</text>
  <text class="t" x="530" y="350" text-anchor="start" dominant-baseline="central">9 · DIG2</text>
  <text class="t" x="530" y="370" text-anchor="start" dominant-baseline="central">8 · DIG3</text>
  <text class="t" x="530" y="390" text-anchor="start" dominant-baseline="central">6 · DIG4</text>

  <!-- Buttons -->
  <line x1="170" y1="415" x2="240" y2="415" stroke="#888780" stroke-width="1.5"/>
  <line x1="170" y1="450" x2="240" y2="450" stroke="#888780" stroke-width="1.5"/>
  <line x1="170" y1="485" x2="240" y2="485" stroke="#888780" stroke-width="1.5"/>
  <rect x="240" y="398" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#8A8578" stroke-width="1"/>
  <rect x="240" y="433" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#8A8578" stroke-width="1"/>
  <rect x="240" y="468" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#8A8578" stroke-width="1"/>
  <text class="t" x="310" y="415" text-anchor="middle" dominant-baseline="central">Start / stop</text>
  <text class="t" x="310" y="450" text-anchor="middle" dominant-baseline="central">Reset work</text>
  <text class="t" x="310" y="485" text-anchor="middle" dominant-baseline="central">Reset break</text>
  <text class="t" x="390" y="415" text-anchor="start" dominant-baseline="central">→ GND</text>
  <text class="t" x="390" y="450" text-anchor="start" dominant-baseline="central">→ GND</text>
  <text class="t" x="390" y="485" text-anchor="start" dominant-baseline="central">→ GND</text>

  <!-- Legend -->
  <line x1="40" y1="540" x2="60" y2="540" stroke="#1D9E75" stroke-width="2"/>
  <text class="t" x="66" y="540" text-anchor="start" dominant-baseline="central">595 control</text>
  <line x1="180" y1="540" x2="200" y2="540" stroke="#6C63C7" stroke-width="2"/>
  <text class="t" x="206" y="540" text-anchor="start" dominant-baseline="central">segment data</text>
  <line x1="340" y1="540" x2="360" y2="540" stroke="#D85A30" stroke-width="2"/>
  <text class="t" x="366" y="540" text-anchor="start" dominant-baseline="central">digit select</text>
  <line x1="490" y1="540" x2="510" y2="540" stroke="#888780" stroke-width="2"/>
  <text class="t" x="516" y="540" text-anchor="start" dominant-baseline="central">buttons (active low)</text>
</svg>
